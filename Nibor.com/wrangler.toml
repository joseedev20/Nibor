# Cloudflare Worker — API de Nibor Finanzas
name = "nibor-finanzas"
main = "server/index.js"
compatibility_date = "2025-10-01"
workers_dev = false
preview_urls = false

[assets]
directory = "./dist/"
not_found_handling = "single-page-application"
# El fallback SPA sirve index.html para rutas no estáticas. Las APIs deben
# llegar primero al Worker; de lo contrario /api/* termina en el 404 de Vue.
run_worker_first = ["/api/*"]
# binding = "ASSETS" permite que el propio Worker lea archivos estáticos
# (ej. imágenes de la API de widgets) desde código, sin exponer una ruta
# nueva que necesite su propio bypass de Access.
binding = "ASSETS"

# Para desarrollo local el database_id puede ser un placeholder.
# Antes del primer deploy remoto: `npx wrangler d1 create nibor-finanzas`
# y pegar aquí el database_id real que devuelve.
[[d1_databases]]
binding = "DB"
database_name = "nibor-finanzas"
database_id = "34265deb-5084-4192-b412-c2f890b18655"
migrations_dir = "migrations"

# Cron de notificaciones frecuente: las reglas del backend deciden si toca avisar.
# Solo corre en producción; en local usar POST /api/notifications/run.
[triggers]
crons = ["*/15 * * * *"]

# Archivos adjuntos (PDFs de SOAT, tecnomecánica, etc.).
# Local: wrangler dev lo simula solo. Antes del primer deploy remoto:
# `npx wrangler r2 bucket create nibor-files`
[[r2_buckets]]
binding = "FILES"
bucket_name = "nibor-files"
