<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login — HabitApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{font-family: system-ui, Arial, sans-serif; padding: 2rem; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f7f7f9;}
    form{background:#fff; padding:2rem; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,.06); width:100%; max-width:380px;}
    label{display:block; margin:.5rem 0 .2rem; font-weight:600;}
    input{width:100%; padding:.7rem .9rem; border:1px solid #ddd; border-radius:10px;}
    button{margin-top:1rem; width:100%; padding:.8rem 1rem; border:none; border-radius:10px; background:#111; color:#fff; font-weight:700; cursor:pointer}
    .hint{color:#555; font-size:.9rem; margin-top:1rem}
  </style>
</head>
<body>
<form id="loginForm" method="POST" action="php/auth/login.php">

    <h2>Iniciar sesión</h2>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="username" required>
    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
    <button type="submit">Entrar</button>
    <p class="hint">Demo rápida: <code>demo@habits.local</code> / <code>demo123</code></p>
  </form>
  <script>
    // Enviar como AJAX para ver respuesta JSON (opcional)
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: {'X-Requested-With': 'XMLHttpRequest'}
      });
      const json = await res.json();
      console.log('json', json)
      if (json.ok) {
        window.location.href = 'php/auth/protected_example.php';
      } else {
        
        alert(json);
      }
    });
  </script>
</body>
</html>
